<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <title>NutriTrack - Voedingstracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px;
            padding-top: max(env(safe-area-inset-top), 20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header .date {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Daily Summary */
        .summary {
            background: var(--card);
            margin: 16px;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .calories-ring {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .ring-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-container svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .ring-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-center .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .ring-center .label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .macros {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .macro {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .macro-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .macro-icon.protein { background: #dbeafe; }
        .macro-icon.carbs { background: #fef3c7; }
        .macro-icon.fat { background: #fce7f3; }

        .macro-info {
            flex: 1;
        }

        .macro-info .name {
            font-size: 13px;
            color: var(--text-muted);
        }

        .macro-info .values {
            font-size: 15px;
            font-weight: 600;
        }

        .macro-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .macro-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .macro-bar-fill.protein { background: #3b82f6; }
        .macro-bar-fill.carbs { background: #f59e0b; }
        .macro-bar-fill.fat { background: #ec4899; }

        /* Meals Section */
        .section-title {
            padding: 0 20px;
            margin-top: 24px;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .meal-card {
            background: var(--card);
            margin: 0 16px 12px;
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .meal-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meal-icon {
            font-size: 24px;
        }

        .meal-name {
            font-weight: 600;
            font-size: 16px;
        }

        .meal-calories {
            font-size: 14px;
            color: var(--text-muted);
        }

        .meal-items {
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .meal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .meal-item:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
        }

        .item-portion {
            font-size: 12px;
            color: var(--text-muted);
        }

        .item-cals {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            padding: 8px;
            margin-left: 8px;
            cursor: pointer;
            border-radius: 8px;
        }

        .add-food-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            background: none;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: max(env(safe-area-inset-bottom), 12px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 28px;
            box-shadow: 0 4px 12px rgb(16 185 129 / 0.4);
            cursor: pointer;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(90vh - 80px);
        }

        /* Search */
        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Food List */
        .food-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .food-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .food-item:hover {
            background: #e2e8f0;
        }

        .food-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .food-details {
            flex: 1;
        }

        .food-name {
            font-weight: 600;
            font-size: 14px;
        }

        .food-brand {
            font-size: 12px;
            color: var(--text-muted);
        }

        .food-nutrition {
            text-align: right;
        }

        .food-cals {
            font-weight: 700;
            color: var(--primary);
        }

        .food-serving {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Portion Modal */
        .portion-section {
            margin-bottom: 20px;
        }

        .portion-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .portion-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
        }

        .portion-input:focus {
            border-color: var(--primary);
        }

        .portion-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .portion-preset {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        .portion-preset.active {
            border-color: var(--primary);
            background: #d1fae5;
        }

        .nutrition-preview {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }

        .nutrition-preview h4 {
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            text-align: center;
        }

        .nutrition-item {
            background: white;
            padding: 12px 8px;
            border-radius: 10px;
        }

        .nutrition-value {
            font-size: 18px;
            font-weight: 700;
        }

        .nutrition-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Goals Page */
        .goals-section {
            padding: 16px;
        }

        .goal-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .goal-title {
            font-weight: 600;
            margin-bottom: 12px;
        }

        .goal-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .goal-input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
        }

        .goal-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .goal-unit {
            font-size: 14px;
            color: var(--text-muted);
            min-width: 50px;
        }

        .save-goals-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        /* History Page */
        .history-section {
            padding: 16px;
        }

        .history-day {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .history-date {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .history-stats {
            display: flex;
            justify-content: space-between;
        }

        .history-stat {
            text-align: center;
        }

        .history-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .history-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Page visibility */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🥗 NutriTrack</h1>
        <div class="date" id="currentDate"></div>
    </header>

    <!-- Home Page -->
    <main class="page active" id="homePage">
        <section class="summary">
            <div class="calories-ring">
                <div class="ring-container">
                    <svg width="120" height="120">
                        <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
                        <circle class="ring-progress" id="calorieRing" cx="60" cy="60" r="50" 
                            stroke-dasharray="314" stroke-dashoffset="314"></circle>
                    </svg>
                    <div class="ring-center">
                        <div class="number" id="remainingCals">2000</div>
                        <div class="label">over</div>
                    </div>
                </div>
                <div class="macros">
                    <div class="macro">
                        <div class="macro-icon protein">🥩</div>
                        <div class="macro-info">
                            <div class="name">Eiwitten</div>
                            <div class="values"><span id="proteinCurrent">0</span> / <span id="proteinGoal">150</span>g</div>
                            <div class="macro-bar">
                                <div class="macro-bar-fill protein" id="proteinBar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="macro">
                        <div class="macro-icon carbs">🍞</div>
                        <div class="macro-info">
                            <div class="name">Koolhydraten</div>
                            <div class="values"><span id="carbsCurrent">0</span> / <span id="carbsGoal">250</span>g</div>
                            <div class="macro-bar">
                                <div class="macro-bar-fill carbs" id="carbsBar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="macro">
                        <div class="macro-icon fat">🥑</div>
                        <div class="macro-info">
                            <div class="name">Vetten</div>
                            <div class="values"><span id="fatCurrent">0</span> / <span id="fatGoal">65</span>g</div>
                            <div class="macro-bar">
                                <div class="macro-bar-fill fat" id="fatBar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <h2 class="section-title">Vandaag</h2>

        <div id="mealsContainer">
            <!-- Meals will be rendered here -->
        </div>
    </main>

    <!-- Goals Page -->
    <div class="page" id="goalsPage">
        <div class="goals-section">
            <div class="goal-card">
                <div class="goal-title">🔥 Dagelijks Calorieën Doel</div>
                <div class="goal-input-group">
                    <input type="number" class="goal-input" id="goalCalories" value="2000">
                    <span class="goal-unit">kcal</span>
                </div>
            </div>
            <div class="goal-card">
                <div class="goal-title">🥩 Eiwitten Doel</div>
                <div class="goal-input-group">
                    <input type="number" class="goal-input" id="goalProtein" value="150">
                    <span class="goal-unit">gram</span>
                </div>
            </div>
            <div class="goal-card">
                <div class="goal-title">🍞 Koolhydraten Doel</div>
                <div class="goal-input-group">
                    <input type="number" class="goal-input" id="goalCarbs" value="250">
                    <span class="goal-unit">gram</span>
                </div>
            </div>
            <div class="goal-card">
                <div class="goal-title">🥑 Vetten Doel</div>
                <div class="goal-input-group">
                    <input type="number" class="goal-input" id="goalFat" value="65">
                    <span class="goal-unit">gram</span>
                </div>
            </div>
            <button class="save-goals-btn" onclick="saveGoals()">Doelen Opslaan</button>
        </div>
    </div>

    <!-- History Page -->
    <div class="page" id="historyPage">
        <div class="history-section" id="historyContainer">
            <!-- History will be rendered here -->
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openSearchModal('ontbijt')">+</button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home')" data-page="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>
            Home
        </button>
        <button class="nav-item" onclick="showPage('goals')" data-page="goals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="6"/>
                <circle cx="12" cy="12" r="2"/>
            </svg>
            Doelen
        </button>
        <button class="nav-item" onclick="showPage('history')" data-page="history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 8v4l3 3"/>
                <circle cx="12" cy="12" r="10"/>
            </svg>
            Historie
        </button>
    </nav>

    <!-- Search Modal -->
    <div class="modal-overlay" id="searchModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Voedsel Toevoegen</h2>
                <button class="modal-close" onclick="closeModal('searchModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="search-container">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" class="search-input" id="foodSearch" placeholder="Zoek producten..." oninput="searchFood(this.value)">
                </div>
                <div class="category-tabs" id="categoryTabs">
                    <button class="category-tab active" data-category="all">Alles</button>
                    <button class="category-tab" data-category="zuivel">Zuivel</button>
                    <button class="category-tab" data-category="brood">Brood</button>
                    <button class="category-tab" data-category="vlees">Vlees & Vis</button>
                    <button class="category-tab" data-category="groenten">Groenten</button>
                    <button class="category-tab" data-category="fruit">Fruit</button>
                    <button class="category-tab" data-category="dranken">Dranken</button>
                    <button class="category-tab" data-category="snacks">Snacks</button>
                </div>
                <div class="food-list" id="foodList">
                    <!-- Food items will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Portion Modal -->
    <div class="modal-overlay" id="portionModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="portionFoodName">Product</h2>
                <button class="modal-close" onclick="closeModal('portionModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="portion-section">
                    <div class="portion-label">Hoeveelheid</div>
                    <input type="number" class="portion-input" id="portionAmount" value="1" min="0.1" step="0.1" oninput="updateNutritionPreview()">
                    <div class="portion-presets" id="portionPresets">
                        <!-- Presets will be rendered here -->
                    </div>
                </div>
                <div class="portion-section">
                    <div class="portion-label">Maaltijd</div>
                    <div class="category-tabs">
                        <button class="category-tab active" data-meal="ontbijt" onclick="selectMeal('ontbijt')">🌅 Ontbijt</button>
                        <button class="category-tab" data-meal="lunch" onclick="selectMeal('lunch')">☀️ Lunch</button>
                        <button class="category-tab" data-meal="diner" onclick="selectMeal('diner')">🌙 Diner</button>

        // App State
        let state = {
            goals: {
                calories: 2000,
                protein: 150,
                carbs: 250,
                fat: 65

                ontbijt: [],
                lunch: [],
                diner: [],
                snacks: []
            },
            history: [],
            selectedFood: null,
            selectedMeal: 'ontbijt',
            currentCategory: 'all'

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem('nutriTrackState');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Check if saved data is from today
                const today = new Date().toDateString();
                if (parsed.date === today) {
                    state = { ...state, ...parsed };
                } else {
                    // Save yesterday's data to history
                    if (parsed.date) {
                        const totals = calculateTotals(parsed.meals);
                        state.history.unshift({
                            date: parsed.date,
                            ...totals
                        });
                        // Keep only last 30 days
                        state.history = state.history.slice(0, 30);
                    }
                    state.goals = parsed.goals || state.goals;
                    state.history = parsed.history || state.history;
                }
            }
        }

        // Save state to localStorage
        function saveState() {
            const toSave = {
                ...state,
                date: new Date().toDateString()
            };
            localStorage.setItem('nutriTrackState', JSON.stringify(toSave));
        }

        // Calculate totals
        function calculateTotals(meals = state.meals) {
            let totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
            Object.values(meals).forEach(mealItems => {
                mealItems.forEach(item => {
                    totals.calories += item.calories;
                    totals.protein += item.protein;
                    totals.carbs += item.carbs;
                    totals.fat += item.fat;
                });
            });
            return totals;
        }

        // Update UI
        function updateUI() {
            const totals = calculateTotals();
            
            // Update calorie ring
            const remaining = state.goals.calories - totals.calories;
            const progress = Math.min(totals.calories / state.goals.calories, 1);
            const circumference = 314;
            const offset = circumference - (progress * circumference);
            
            document.getElementById('calorieRing').style.strokeDashoffset = offset;
            document.getElementById('remainingCals').textContent = Math.abs(remaining);
            document.querySelector('.ring-center .label').textContent = remaining >= 0 ? 'over' : 'over';
            
            // Update macros
            document.getElementById('proteinCurrent').textContent = Math.round(totals.protein);
            document.getElementById('carbsCurrent').textContent = Math.round(totals.carbs);
            document.getElementById('fatCurrent').textContent = Math.round(totals.fat);
            
            document.getElementById('proteinGoal').textContent = state.goals.protein;
            document.getElementById('carbsGoal').textContent = state.goals.carbs;
            document.getElementById('fatGoal').textContent = state.goals.fat;
            
            document.getElementById('proteinBar').style.width = Math.min((totals.protein / state.goals.protein) * 100, 100) + '%';
            document.getElementById('carbsBar').style.width = Math.min((totals.carbs / state.goals.carbs) * 100, 100) + '%';
            document.getElementById('fatBar').style.width = Math.min((totals.fat / state.goals.fat) * 100, 100) + '%';
            
            // Render meals
            renderMeals();
            
            // Update goals inputs
            document.getElementById('goalCalories').value = state.goals.calories;
            document.getElementById('goalProtein').value = state.goals.protein;
            document.getElementById('goalCarbs').value = state.goals.carbs;
            document.getElementById('goalFat').value = state.goals.fat;
            
            // Render history
            renderHistory();
        }

        // Render meals
        function renderMeals() {
            const mealConfig = [
                { key: 'ontbijt', name: 'Ontbijt', icon: '🌅' },
                { key: 'lunch', name: 'Lunch', icon: '☀️' },
                { key: 'diner', name: 'Diner', icon: '🌙' },
                { key: 'snacks', name: 'Snacks', icon: '🍿' }
            ];
            
            const container = document.getElementById('mealsContainer');
            container.innerHTML = mealConfig.map(meal => {
                const items = state.meals[meal.key];
                const mealCalories = items.reduce((sum, item) => sum + item.calories, 0);
                
                return `
                    <div class="meal-card">
                        <div class="meal-header">
                            <div class="meal-title">
                                <span class="meal-icon">${meal.icon}</span>
                                <span class="meal-name">${meal.name}</span>
                            </div>
                            <span class="meal-calories">${Math.round(mealCalories)} kcal</span>
                        </div>
                        ${items.length > 0 ? `
                            <div class="meal-items">
                                ${items.map((item, index) => `
                                    <div class="meal-item">
                                        <div class="item-info">
                                            <div class="item-name">${item.icon} ${item.name}</div>
                                            <div class="item-portion">${item.amount} × ${item.serving}</div>
                                        </div>
                                        <span class="item-cals">${Math.round(item.calories)} kcal</span>
                                        <button class="delete-btn" onclick="removeFood('${meal.key}', ${index})">🗑️</button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        <button class="add-food-btn" onclick="openSearchModal('${meal.key}')">
                            + Voedsel toevoegen
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Render history
        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if (state.history.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">Nog geen historie beschikbaar</p>';
                return;
            }
            
            container.innerHTML = state.history.map(day => `
                <div class="history-day">
                    <div class="history-date">${day.date}</div>
                    <div class="history-stats">
                        <div class="history-stat">
                            <div class="history-value">${Math.round(day.calories)}</div>
                            <div class="history-label">kcal</div>
                        </div>
                        <div class="history-stat">
                            <div class="history-value">${Math.round(day.protein)}g</div>
                            <div class="history-label">eiwit</div>
                        </div>
                        <div class="history-stat">
                            <div class="history-value">${Math.round(day.carbs)}g</div>
                            <div class="history-label">koolh.</div>
                        </div>
                        <div class="history-stat">
                            <div class="history-value">${Math.round(day.fat)}g</div>
                            <div class="history-label">vet</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search and filter food
        function searchFood(query) {
            renderFoodList(query.toLowerCase());
        }

        function filterCategory(category) {
            state.currentCategory = category;
            document.querySelectorAll('#categoryTabs .category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderFoodList(document.getElementById('foodSearch').value.toLowerCase());
        }

        function renderFoodList(searchQuery = '') {
            let filtered = foodDatabase;
            
            if (state.currentCategory !== 'all') {
                filtered = filtered.filter(f => f.category === state.currentCategory);
            }
            
            if (searchQuery) {
                filtered = filtered.filter(f => 
                    f.name.toLowerCase().includes(searchQuery) ||
                    f.brand.toLowerCase().includes(searchQuery)
                );
            }
            
            const container = document.getElementById('foodList');
            container.innerHTML = filtered.map(food => `
                <div class="food-item" onclick="selectFood(${food.id})">
                    <div class="food-image">${food.icon}</div>
                    <div class="food-details">
                        <div class="food-name">${food.name}</div>
                        <div class="food-brand">${food.brand}</div>
                    </div>
                    <div class="food-nutrition">
                        <div class="food-cals">${food.calories} kcal</div>
                        <div class="food-serving">per ${food.serving}</div>
                    </div>
                </div>
            `).join('');
        }

        // Select food
        function selectFood(foodId) {
            state.selectedFood = foodDatabase.find(f => f.id === foodId);
            document.getElementById('portionFoodName').textContent = state.selectedFood.name;
            document.getElementById('portionAmount').value = 1;
            
            // Render presets
            const presets = document.getElementById('portionPresets');
            presets.innerHTML = ['0.5', '1', '1.5', '2'].map(val => `
                <button class="portion-preset ${val === '1' ? 'active' : ''}" onclick="setPreset(${val})">${val}×</button>
            `).join('');
            
            updateNutritionPreview();
            closeModal('searchModal');
            document.getElementById('portionModal').classList.add('active');
            
            // Set active meal tab
            document.querySelectorAll('#portionModal .category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.meal === state.selectedMeal);
            });
        }

        function setPreset(value) {
            document.getElementById('portionAmount').value = value;
            document.querySelectorAll('.portion-preset').forEach(btn => {
                btn.classList.toggle('active', parseFloat(btn.textContent) === value);
            });
            updateNutritionPreview();
        }

        function selectMeal(meal) {
            state.selectedMeal = meal;
            document.querySelectorAll('#portionModal .category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.meal === meal);
            });
        }

        function updateNutritionPreview() {
            if (!state.selectedFood) return;
            const amount = parseFloat(document.getElementById('portionAmount').value) || 1;
            
            document.getElementById('previewCals').textContent = Math.round(state.selectedFood.calories * amount);
            document.getElementById('previewProtein').textContent = Math.round(state.selectedFood.protein * amount) + 'g';
            document.getElementById('previewCarbs').textContent = Math.round(state.selectedFood.carbs * amount) + 'g';
            document.getElementById('previewFat').textContent = Math.round(state.selectedFood.fat * amount) + 'g';
        }

        function addFoodToMeal() {
            if (!state.selectedFood) return;
            
            const amount = parseFloat(document.getElementById('portionAmount').value) || 1;
            const entry = {
                id: Date.now(),
                foodId: state.selectedFood.id,
                name: state.selectedFood.name,
                icon: state.selectedFood.icon,
                serving: state.selectedFood.serving,
                amount: amount,
                calories: state.selectedFood.calories * amount,
                protein: state.selectedFood.protein * amount,
                carbs: state.selectedFood.carbs * amount,
                fat: state.selectedFood.fat * amount
            };
            
            state.meals[state.selectedMeal].push(entry);
            saveState();
            updateUI();
            closeModal('portionModal');
            showToast(`${state.selectedFood.name} toegevoegd!`);
        }

        function removeFood(meal, index) {
            state.meals[meal].splice(index, 1);
            saveState();
            updateUI();
            showToast('Verwijderd');
        }

        // Modal functions
        function openSearchModal(meal) {
            state.selectedMeal = meal;
            state.currentCategory = 'all';
            document.getElementById('foodSearch').value = '';
            document.querySelectorAll('#categoryTabs .category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === 'all');
            });
            renderFoodList();
            document.getElementById('searchModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Page navigation
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
        }

        // Goals
        function saveGoals() {
            state.goals.calories = parseInt(document.getElementById('goalCalories').value) || 2000;
            state.goals.protein = parseInt(document.getElementById('goalProtein').value) || 150;
            state.goals.carbs = parseInt(document.getElementById('goalCarbs').value) || 250;
            state.goals.fat = parseInt(document.getElementById('goalFat').value) || 65;
            saveState();
            updateUI();
            showToast('Doelen opgeslagen!');
        }

        // Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Set current date
        function setCurrentDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('nl-NL', options);
        }

        // Category tab event listeners
        document.querySelectorAll('#categoryTabs .category-tab').forEach(tab => {
            tab.addEventListener('click', () => filterCategory(tab.dataset.category));
        });

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });

        // Initialize
        loadState();
        setCurrentDate();
        updateUI();

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
